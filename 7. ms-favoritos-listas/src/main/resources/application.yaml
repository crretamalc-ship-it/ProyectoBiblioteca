server:
  port: 8087

spring:
  application:
    name: ms-favoritos-listas
  datasource:
    url: jdbc:mysql://localhost:3307/library_favorites_db?createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    root: INFO
